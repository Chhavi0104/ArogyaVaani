<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AarogyaVaani — Login</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    </head>

    <body>
        <div class="main">
            <div class="top-section">
                <h1 class="playfair-display-heading">AarogyaVaani</h1>
                <div class="profile-image">
                    <img src="assets/profile-icon.png" height="70px" alt="Profile icon">
                </div>
            </div>

            <div class="form-area">
                <form class="poppins-regular-italic">
                    <input type="text" id="username" name="username" placeholder="Username">
                    <input type="password" id="password" name="password" placeholder="Password">
                    <input type="submit" value="Login">
                </form>
                <p class="poppins-light">Don't have an account?</p>
                <a href="signup.html">Sign up</a>
            </div>

            <div class="footer poppins-light">
                <p>Designed and Developed by</p>
                <p>Chhavi Bhardwaj • Bhavika Arora • Jaskiran Kaur</p>
            </div>
        </div>
    </body>
</html>
